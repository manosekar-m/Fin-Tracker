name: fin_tracker
description: A complete personal finance tracker app
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.65.0
  intl: ^0.18.0
  local_auth: ^2.1.6
  uuid: ^4.2.2
  url_launcher: ^6.2.1
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1
  flutter_animate: ^4.5.2
  pdf: ^3.11.1
  printing: ^5.14.3
  share_plus: ^13.1.0
  path_provider: ^2.1.2
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
